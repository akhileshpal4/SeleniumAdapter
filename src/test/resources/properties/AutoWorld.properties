########### ALL THE CONFIGURATION PARAMETER TO BE MANAGED FROM HERE ###########
##### ENVIRONMENT PROPERTIES #########
SeleniumGrid=false
Browserstack=false
hub_url=http://user:pass@hub-cloud.browserstack.com/wd/hub
############ Platform ###################
platform=any
java.awt.headless=true
######## Headless browser execution #############
headless=false
headless.options.list.of.strings=--headless,--no-sandbox,--disable-dev-shm-usage,--ignore-certification-errors,--allow-running-insecure-content,--remote-allow-origins=*
########## Browser Setup (Options can be Edge/Chrome/Firefox) ##########
browser=chrome
############# Chrome Configuration #################
chrome.version=
options.list.of.strings=test-type,--start-maximized,--disable-extensions,--disable-infobars,--acceptInsecureCerts,remote-allow-origin=*,--incognito
chrome.caps.list.of.strings=browserstack.local,true||acceptSslCerts,true||ignoreZoomSettings,true||networkLogs,true||wsLocalSupport,true
auto.file.download=false
chrome.file.download.path=
############ Firefox Configuration ################
firefox.version=60
########### Edge Configuration ##################
edge.version=
edge.driver=64
edge.caps.list.of.strings=
############# PROXY Configuration ##################
proxy.url=
proxy.port=